name: Online Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许你随时在网页上手动点击按钮打包

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 1. 拉取仓库代码
      uses: actions/checkout@v4

    - name: 2. 在云端用 GCC 静态打包
      run: |
        gcc main.c -o cf_tester.exe -lws2_32 -lwinmm -static -O3

    - name: 3. 把打包好的 EXE 变成下载链接
      uses: actions/upload-artifact@v4
      with:
        name: cf_tester_windows
        path: cf_tester.exe
